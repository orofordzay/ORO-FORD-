function Badge({ type }) {

function ContactForm({ prefill, onBack }) {

<button onClick={()=>set(“sent”,true)} style={{ background:B, color:”#fff”, border:“none”, padding:14, fontWeight:800, fontSize:“0.88rem”, letterSpacing:“0.1em”, textTransform:“uppercase”, cursor:“pointer”, borderRadius:8 }}>
Send Message
</button>
</div>
);
}
